<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Setup - TailsMusic</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <div class="card logo-card">
    <a href="/" class="back-link">&larr; Back</a>
    <h1>&#128269; Connect to WiFi</h1>
    <p class="subtitle">Enter your network details manually</p>
  </div>

  <div class="card">
    <h2>Network Name (SSID)</h2>
    <input type="text" id="ssid-input" placeholder="Enter WiFi SSID" autocomplete="off">
  </div>

  <div class="card">
    <h2>Password</h2>
    <input type="password" id="password-input" placeholder="WiFi password (leave blank for open networks)" autocomplete="off">
  </div>

  <div class="card">
    <button class="btn" onclick="connectToWifi()">Connect</button>
    <p id="error-msg" class="error"></p>
  </div>

  <div class="card" id="connected-card" style="display:none">
    <h2>&#9989; Connected!</h2>
    <p id="connected-msg"></p>
    <p class="small">After turning off the hotspot, TailsMusic will use this network.</p>
    <button class="btn" onclick="location.href='/'">Done</button>
  </div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
