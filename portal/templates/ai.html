<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TailsMusic AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #111; color: #eee; height: 100vh; display: flex; flex-direction: column; }
.chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
.msg { padding: 0.5rem 1rem; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
.user { background: #1a6; align-self: flex-end; }
.ai { background: #333; align-self: flex-start; }
.input-row { display: flex; padding: 0.75rem; gap: 0.5rem; border-top: 1px solid #333; }
.input-row input { flex: 1; padding: 0.75rem; border-radius: 6px; border: 1px solid #555; background: #222; color: #eee; font-size: 1rem; }
.input-row button { padding: 0.75rem 1.5rem; border-radius: 6px; border: none; background: #1a6; color: #fff; font-size: 1rem; cursor: pointer; }
.input-row button:disabled { opacity: 0.5; }
.thinking { color: #888; font-style: italic; align-self: flex-start; }
</style>
</head>
<body>
<div class="chat" id="chat">
  <div class="msg ai">Hello! I'm TailsMusic AI. How can I help you?</div>
</div>
<div class="input-row">
  <input type="text" id="input" placeholder="Type a message..." autofocus>
  <button id="send">Send</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');
function addMsg(text, cls) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
let thinking = null;
send.onclick = async () => {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg(msg, 'user');
  send.disabled = true;
  thinking = document.createElement('div');
  thinking.className = 'thinking';
  thinking.textContent = 'Thinking...';
  chat.appendChild(thinking);
  try {
    const r = await fetch('/api/ai/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await r.json();
    thinking.remove();
    thinking = null;
    addMsg(data.response || 'No response', 'ai');
    if (data.commands && data.commands.length) {
      addMsg('[Commands: ' + data.commands.join(', ') + ']', 'ai');
    }
  } catch(e) {
    if (thinking) thinking.remove();
    addMsg('Error: ' + e.message, 'ai');
  }
  send.disabled = false;
  input.focus();
};
input.addEventListener('keydown', e => { if (e.key === 'Enter') send.click(); });
</script>
</body>
</html>
